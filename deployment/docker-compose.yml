version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stockflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  backend:
    build:
      context: ../backend
    restart: unless-stopped
    env_file: .env.docker
    depends_on:
      - db
    ports:
      - '5000:5000'
    command: sh -c "npx prisma migrate deploy && node src/index.js"

  frontend:
    build:
      context: ../frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  pgdata:
