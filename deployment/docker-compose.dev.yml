version: '3.9'

services:
  backend:
    volumes:
      - ../backend/src:/app/src
    environment:
      NODE_ENV: development
    command: sh -c "npx prisma migrate dev --name init && npm run dev"

  frontend:
    ports:
      - '5173:5173'
    volumes:
      - ../frontend/src:/app/src
    command: npm run dev -- --host
